  <!-- Lightbox Modal -->
  <div id="lightbox-modal" class="lightbox-modal">
    <div class="lightbox-container">
      <button id="close-btn" class="lightbox-close">點擊四周以離開</button>
      <img id="lightbox-image" src="" alt="">
    </div>
  </div>

  <script>
    const modal = document.getElementById('lightbox-modal');
    const lightboxImage = document.getElementById('lightbox-image');
    const closeBtn = document.getElementById('close-btn');
    const galleryItems = document.querySelectorAll('.gallery-item');

    // 打開 Lightbox 並載入高清圖片
    galleryItems.forEach(item => {
      item.addEventListener('click', function() {
        // 先顯示縮圖
        const img = this.querySelector('img');
        lightboxImage.src = img.src;
        lightboxImage.style.opacity = '0'; // 降低透明度表示載入中
        modal.classList.add('active');
        
        // 然後嘗試載入高清圖片
        const fullImageWebp = this.dataset.fullimage;
        const fullImageJpg = this.dataset.fullimageJpg;
        
        // 先嘗試載入 WebP 版本
        const highResImg = new Image();
        highResImg.onload = function() {
          lightboxImage.src = fullImageWebp;
          lightboxImage.style.opacity = '1'; // 恢復透明度
        };
        highResImg.onerror = function() {
          // 如果 WebP 失敗，嘗試 JPEG
          const jpgImg = new Image();
          jpgImg.onload = function() {
            lightboxImage.src = fullImageJpg;
            lightboxImage.style.opacity = '1';
          };
          jpgImg.onerror = function() {
            // 如果都失敗，保持縮圖並恢復透明度
            lightboxImage.style.opacity = '1';
          };
          jpgImg.src = fullImageJpg;
        };
        highResImg.src = fullImageWebp;
      });
    });

    // 關閉 Lightbox
    closeBtn.addEventListener('click', function() {
      modal.classList.remove('active');
    });

    // 點擊背景也可以關閉
    modal.addEventListener('click', function(e) {
      if (e.target === modal) {
        modal.classList.remove('active');
      }
    });
  </script>

  <script>
    (function () {
      const body = document.body;
      const toggleButton = document.querySelector('.theme-toggle');
      const toggleIcon = document.querySelector('.theme-toggle img');

      const savedTheme = localStorage.getItem('theme');
      const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      const theme = savedTheme || systemTheme;

      function applyTheme(nextTheme) {
        body.setAttribute('data-theme', nextTheme);
        localStorage.setItem('theme', nextTheme);

        if (toggleButton) {
          toggleButton.setAttribute('aria-pressed', String(nextTheme === 'dark'));
          toggleButton.setAttribute('title', nextTheme === 'dark' ? '切換至淺色模式' : '切換至夜間模式');
        }

        if (toggleIcon) {
          toggleIcon.src = nextTheme === 'dark' ? '/images/Dark_on.webp' : '/images/Dark_off.webp';
        }
      }

      applyTheme(theme);

      if (toggleButton) {
        toggleButton.addEventListener('click', () => {
          const nextTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          applyTheme(nextTheme);
        });
      }
    })();
  </script>
